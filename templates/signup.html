<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CampusVault — Sign Up</title>

  <!-- Global styles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('frontend.static', filename='css/components.css') }}">

  <!-- Page styles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/signup.css') }}">
</head>
<body>
  <main class="cv-container cv-center">
    <section class="cv-card cv-card--compact cv-signup-card" aria-labelledby="signup-heading">
      <h1 id="signup-heading">Create an account</h1>
      <p class="cv-small cv-muted">Sign up as a Student or Faculty.</p>

      <form id="signup-form" class="cv-form" novalidate>
        <label class="cv-field">
          <span class="cv-label">Full Name</span>
          <input id="signup-name" name="name" type="text" autocomplete="name" required />
        </label>

        <label class="cv-field">
          <span class="cv-label">Email</span>
          <input id="signup-email" name="email" type="email" autocomplete="email" required />
        </label>

        <label class="cv-field">
          <span class="cv-label">Password</span>
          <input id="signup-password" name="password" type="password" autocomplete="new-password" required />
        </label>

        <label class="cv-field">
          <span class="cv-label">College ID</span>
          <input id="college-id" name="college_id" type="text" autocomplete="username" required />
        </label>

        <label class="cv-field">
          <span class="cv-label">Role</span>
          <select id="signup-role" name="role" required>
            <option value="student" selected>Student</option>
            <option value="faculty">Faculty</option>
          </select>
        </label>

        <!-- Faculty verification code: hidden unless role==faculty -->
        <label class="cv-field hidden" id="faculty-code-field">
          <span class="cv-label">Faculty Verification Code</span>
          <input id="signup-faculty-code" name="faculty_code" type="text" placeholder="Enter faculty code (provided by college)" />
          <p class="cv-small cv-muted">Only required for faculty accounts. If you are a faculty member, enter the code provided by the college.</p>
        </label>
        

        <div class="cv-actions">
          <button id="signup-submit" class="cv-btn cv-btn-primary" type="submit">Create account</button>
        </div>

        <p class="cv-small">Already registered? <a href="/sign_in.html">Login here</a></p>
      </form>

      <div id="signup-error" role="alert" class="cv-error" aria-live="polite"></div>
    </section>
  </main>

  <!-- Shared scripts -->
  <script type="module" src="{{ url_for('static', filename='js/pages/signup.page.js') }}"></script>
</body>
</html>
